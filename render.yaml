services:
  # ── API (inference only — no celery/worker/mlflow/prometheus/grafana) ──
  - type: web
    name: neurodrug-api
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/v1/health/
    envVars:
      - key: POSTGRES_HOST
        sync: false
      - key: POSTGRES_PORT
        sync: false
      - key: POSTGRES_USER
        sync: false
      - key: POSTGRES_PASSWORD
        sync: false
      - key: POSTGRES_DB
        sync: false
      - key: POSTGRES_SSL
        value: "true"
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: ENVIRONMENT
        value: production
      - key: REDIS_URL
        value: redis://localhost:6379/0
      - key: MLFLOW_TRACKING_URI
        value: ""
      - key: SENTRY_DSN
        value: ""

  # ── Frontend (Next.js, standalone build) ──
  - type: web
    name: neurodrug-frontend
    env: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://neurodrug-api.onrender.com
      - key: INTERNAL_API_URL
        value: https://neurodrug-api.onrender.com
