replicaCount: 2

image:
  repository: ghcr.io/neurodrug/api
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false

resources:
  limits:
    cpu: 2000m
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 512Mi

postgresql:
  enabled: true
  auth:
    username: neurodrug_user
    database: neurodrug

redis:
  enabled: true
