global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  # ── API (FastAPI + prometheus-fastapi-instrumentator) ──────────────────
  - job_name: "neurodrug_api"
    static_configs:
      - targets: ["api:8000"]
    metrics_path: "/metrics/"
    scrape_interval: 10s

  # ── Redis — via redis_exporter (speaks Redis protocol → exposes HTTP) ──
  # Scraping redis:6379 directly with HTTP causes Redis to log a
  # "Possible SECURITY ATTACK" and drop the connection. Use the exporter.
  - job_name: "redis"
    static_configs:
      - targets: ["redis_exporter:9121"]

  # ── PostgreSQL — via postgres_exporter (speaks PG wire → exposes HTTP) ─
  # Scraping postgres:5432 directly causes "invalid length of startup packet"
  # for the same reason. Use the exporter.
  - job_name: "postgres"
    static_configs:
      - targets: ["postgres_exporter:9187"]

  # ── Celery / Flower ────────────────────────────────────────────────────
  - job_name: "celery_worker"
    static_configs:
      - targets: ["flower:5555"]
    metrics_path: "/metrics"
