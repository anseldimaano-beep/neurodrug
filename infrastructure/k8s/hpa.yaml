apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: neurodrug-api-hpa
  namespace: neurodrug
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: neurodrug-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
